<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Playbook Soporte</title>
  <meta name="description" content="Acceso autenticado al playbook de soporte." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="bg-grid" aria-hidden="true"></div>
  <main class="auth-layout">
    <section class="auth-card">
      <div class="brand auth-brand">
        <div class="brand-dot"></div>
        <div>
          <h1>Login Soporte</h1>
          <p>Ingresa con tu usuario autorizado</p>
        </div>
      </div>

      <form id="loginForm" class="auth-form">
        <label for="email">Correo</label>
        <input id="email" name="email" type="email" required autocomplete="username" placeholder="soporte@fundacionluker.org.co" />

        <label for="password">Contrasena</label>
        <input id="password" name="password" type="password" required autocomplete="current-password" placeholder="Tu clave" />

        <button class="btn auth-btn" type="submit">Entrar al playbook</button>
        <p id="loginMessage" class="auth-message" aria-live="polite"></p>
      </form>
    </section>
  </main>

  <script src="login.js"></script>
</body>
</html>
